<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sude'ye Özel | Lütfen Affet</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff0055; /* Daha canlı bir neon kırmızı/pembe */
            --secondary: #ff00c8;
            --text: #ffffff;
            --glass: rgba(0, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* Derin siyah */
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            perspective: 2000px;
        }

        /* 1. KOMBO: Arka Plan Partikül Efekti */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 2. KOMBO: 3D Dönen Sude Yazısı */
        .sude-header {
            position: absolute;
            top: 5vh;
            font-family: 'Poiret One', cursive; /* Daha sanatsal bir font */
            font-size: 8rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 15px;
            z-index: 2;
            animation: rotateName 10s linear infinite, glowName 2s ease-in-out infinite alternate;
            transform-style: preserve-3d;
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px var(--primary), 0 0 40px var(--primary);
        }

        @keyframes rotateName {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        @keyframes glowName {
            from { text-shadow: 0 0 10px #fff, 0 0 20px var(--primary); }
            to { text-shadow: 0 0 20px #fff, 0 0 40px var(--secondary), 0 0 60px var(--secondary); }
        }

        /* Premium Cam Kart */
        .main-card {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            max-width: 550px;
            width: 90%;
            z-index: 3;
            transform: rotateX(10deg);
            transition: transform 0.5s ease;
        }

        .main-card:hover {
            transform: rotateX(0deg) scale(1.02);
        }

        .flower-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: heartBeat 1.5s infinite;
        }

        h1 {
            color: var(--text);
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        h1 strong {
            color: var(--primary);
            font-weight: 900;
            text-shadow: 0 0 15px var(--primary);
        }

        p {
            color: #cccccc;
            font-size: 1.1rem;
            line-height: 1.9;
            font-weight: 300;
            margin-bottom: 40px;
        }

        /* Butonlar */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        button {
            padding: 18px 45px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        #yesBtn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 15px 30px rgba(255, 0, 85, 0.5);
        }

        #yesBtn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: rgba(255,255,255,0.2);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        #yesBtn:hover::after {
            left: 120%;
        }

        #yesBtn:hover {
            transform: scale(1.1) translateY(-7px);
            box-shadow: 0 20px 40px rgba(255, 0, 85, 0.7);
        }

        #noBtn {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        /* Mobil Uyum */
        @media (max-width: 768px) {
            .sude-header { font-size: 4rem; letter-spacing: 5px; top: 10vh;}
            .main-card { padding: 30px; margin-top: 100px;}
            h1 { font-size: 1.8rem; }
            .flower-icon { font-size: 50px; }
            button { padding: 12px 25px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="sude-header">Sude</div>

    <div class="main-card">
        <div class="flower-icon">🥀</div>
        <h1 id="title">Lütfen Affet, <strong>Sude</strong></h1>
        <p id="desc">
            Seni kırmak, hayatta yapabileceğim en büyük hataydı. Sensiz geçen her an, renksiz ve boş... Bizim hikayemiz bu kadar basit bitmemeli. Aramızdaki buzları eritip, bana kocaman, sıcacık bir şans daha verir misin? Sen benim her şeyimsin.
        </p>
        
        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">EVET ❤️</button>
            <button id="noBtn" onmouseover="dodge()">Hayır</button>
        </div>
    </div>

    <script>
        // --- 1. KOMBO: Particles.js Ayarları ---
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ff0055" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ff0055", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
                "modes": { "grab": { "distance": 200, "line_linked": { "opacity": 1 } } }
            },
            "retina_detect": true
        });

        // --- 2. KOMBO: Gelişmiş Kaçan Buton ---
        function dodge() {
            const btn = document.getElementById('noBtn');
            // Butonun kendi boyutlarını al
            const btnWidth = btn.offsetWidth;
            const btnHeight = btn.offsetHeight;
            
            // Ekran sınırlarını ve buton boyutunu hesaba katarak rastgele pozisyon
            const x = Math.random() * (window.innerWidth - btnWidth - 50) + 25;
            const y = Math.random() * (window.innerHeight - btnHeight - 50) + 25;
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.zIndex = "100"; // En üstte kalması için
        }

        // --- 3. KOMBO: Evet Kutlaması ve Müzik ---
        function celebrate() {
            // Müzik çalma (Eğer audio elementi varsa)
            const music = document.getElementById('myMusic');
            if(music) { music.play().catch(e => console.log("Müzik otomatik başlatılamadı:", e)); }

            // Havai fişek konfeti
            const duration = 10 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                const particleCount = 50 * (timeLeft / duration);
                // Kalp konfetileri için
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }, colors: ['#ff0055', '#ffffff'] }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }, colors: ['#ff00c8', '#ffffff'] }));
            }, 250);

            // İçeriği değiştir
            document.getElementById('title').innerHTML = "Teşekkür Ederim, <strong>Sude</strong>! ✨";
            document.getElementById('desc').innerHTML = "Beni dünyanın en mutlu insanı yaptın. Sana söz veriyorum, bir daha o güzel gözlerini asla üzüntüyle doldurmayacağım. Seni çok, çok seviyorum! ❤️<br><br><span style='font-size:30px'>🥰💏💍</span>";
            document.querySelector('.btn-group').style.display = 'none';
            document.querySelector('.main-card').style.transform = 'scale(1.1) rotateX(0deg)';
            document.querySelector('.main-card').style.boxShadow = '0 0 100px rgba(255, 0, 132, 0.8)';
            document.querySelector('.flower-icon').innerHTML = "❤️";
        }
    </script>
</body>
</html>
